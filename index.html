<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' data: blob: ws: wss: https:; img-src 'self' data: https:; object-src 'none'; base-uri 'none'; frame-ancestors 'none';" />
  <title>MagiesTerminal SSH</title>
  <style>
    /* Load extended Unicode ranges for terminal box drawing characters */
    @font-face {
      font-family: 'JetBrains Mono Extended';
      src: local('JetBrains Mono'), local('JetBrainsMono-Regular');
      unicode-range: U+2500-257F, U+2580-259F, U+25A0-25FF, U+2700-27BF;
    }

    /* First-paint bootstrap palette, mirrored from the ember-day /
       ember-night presets in infrastructure/config/uiThemes.ts so the
       window opens in the app's own colours instead of flashing the
       previous blue chrome before React mounts. */
    :root {
      --background: 28 30% 97%;
      --foreground: 24 18% 12%;
      --card: 0 0% 100%;
      --card-foreground: 24 18% 12%;
      --popover: 0 0% 100%;
      --popover-foreground: 24 18% 12%;
      --primary: 16 90% 44%;
      --primary-foreground: 40 60% 98%;
      --secondary: 28 22% 92%;
      --secondary-foreground: 24 20% 18%;
      --muted: 28 20% 93%;
      --muted-foreground: 24 12% 38%;
      --accent: var(--primary);
      --accent-foreground: 40 60% 98%;
      --destructive: 358 70% 47%;
      --destructive-foreground: 0 0% 100%;
      --border: 28 18% 86%;
      --input: 28 18% 86%;
      --ring: 16 90% 44%;
      --radius: 0.375rem;
    }

    .dark {
      --background: 24 14% 8%;
      --foreground: 36 28% 90%;
      --card: 24 12% 11%;
      --card-foreground: 36 28% 90%;
      --popover: 24 12% 12%;
      --popover-foreground: 36 28% 90%;
      --primary: 24 95% 56%;
      --primary-foreground: 24 40% 8%;
      --secondary: 24 10% 16%;
      --secondary-foreground: 36 24% 88%;
      --muted: 24 12% 15%;
      --muted-foreground: 30 14% 64%;
      --accent: var(--primary);
      --accent-foreground: 24 40% 8%;
      --destructive: 2 78% 58%;
      --destructive-foreground: 24 40% 8%;
      --border: 26 12% 20%;
      --input: 26 12% 20%;
      --ring: 24 95% 56%;
      --radius: 0.375rem;
    }

    body {
      font-family: 'Space Grotesk', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
    }

    html.platform-win32 body {
      font-family: 'Noto Color Emoji Flags', 'Space Grotesk', system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif, 'Segoe UI Emoji', 'Segoe UI Symbol';
    }

    /* Global Modern Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: hsl(var(--muted-foreground) / 0.3);
      border-radius: 99px;
      border: 3px solid transparent;
      background-clip: content-box;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: hsl(var(--muted-foreground) / 0.5);
      background-clip: content-box;
    }

    ::-webkit-scrollbar-corner {
      background: transparent;
    }

    /* Utility to hide scrollbar */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Splash screen styles */
    .splash-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: hsl(var(--background));
      z-index: 9999;
      transition: opacity 0.2s ease-out;
    }

    .splash-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .splash-logo {
      width: 64px;
      height: 64px;
      border-radius: 14px;
    }

    .splash-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid hsl(var(--muted));
      border-top-color: hsl(var(--primary));
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('magiesTerminal_theme_v1');
        var accentMode = localStorage.getItem('magiesTerminal_accent_mode_v1');
        var accentColor = localStorage.getItem('magiesTerminal_color_v1');
        var lang = localStorage.getItem('magiesTerminal_ui_language_v1');
        var root = document.documentElement;

        // Resolve 'system' (or absent — default is 'system') via OS preference
        var resolved = theme;
        if (!theme || theme === 'system') {
          resolved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        if (resolved === 'dark' || resolved === 'light') {
          root.classList.remove('light', 'dark');
          root.classList.add(resolved);
        }

        if (accentMode === 'custom' && accentColor) {
          root.style.setProperty('--primary', accentColor);
          root.style.setProperty('--accent', accentColor);
          root.style.setProperty('--ring', accentColor);
          var parts = accentColor.split(/\s+/);
          var lightness = parseFloat((parts[2] || '').replace('%', ''));
          var accentForeground = resolved === 'dark'
            ? '220 40% 96%'
            : (!isNaN(lightness) && lightness < 55 ? '0 0% 98%' : '222 47% 12%');
          root.style.setProperty('--accent-foreground', accentForeground);
          root.style.setProperty('--primary-foreground', accentForeground);
        }

        if (lang) root.lang = lang;

        var ua = navigator.userAgent || '';
        if (/Win/i.test(ua)) {
          root.classList.add('platform-win32');
        }
      } catch (e) {
        // ignore
      }
    })();
  </script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-background text-foreground overflow-hidden antialiased h-screen w-screen">
  <div id="root" class="h-full w-full">
    <!-- Splash screen: shown while React loads, hidden after first paint -->
    <div id="splash" class="splash-screen">
      <div class="splash-content">
        <img class="splash-logo" src="/logo.svg" alt="MagiesTerminal" draggable="false" />

        <div class="splash-spinner"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
